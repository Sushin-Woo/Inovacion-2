# Despliegue del Dashboard (dashboard/) a GitHub Pages.
#
# Seguridad: la URL de la API se inyecta desde los "secrets/vars" del repo,
# NUNCA se commitea. Configúralos en:
#   Settings > Secrets and variables > Actions
#     - Variable  VITE_API_URL  (p.ej. https://api.tu-dominio.com)
#     - Variable  VITE_BASE     (p.ej. /Inovacion-2/  para Pages en subruta)
#
# Activa Pages en Settings > Pages > Source: GitHub Actions.
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['dashboard/**', '.github/workflows/deploy-dashboard.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE: ${{ vars.VITE_BASE }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
